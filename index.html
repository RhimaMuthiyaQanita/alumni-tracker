<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Alumni — Sistem Pelacakan Alumni UMM</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zm-1 13.99l-7-3.82V17l7 4 7-4v-3.83l-7 3.82z"/>
        </svg>
      </div>

      <h1 class="auth-title">Login Alumni</h1>
      <p class="auth-subtitle">Sistem Pelacakan Alumni<br>Universitas Muhammadiyah Malang</p>

      <div class="error-msg" id="errorMsg">
        <strong>Login gagal.</strong> NIM atau Program Studi tidak ditemukan dalam sistem.
      </div>

      <div class="form-group">
        <label class="form-label" for="nim">Nomor Induk Mahasiswa (NIM)</label>
        <span class="form-hint">Contoh: 95620625</span>
        <input type="text" id="nim" class="form-control" placeholder="Masukkan NIM kamu" autocomplete="off">
      </div>

      <div class="form-group">
        <label class="form-label" for="prodi">Program Studi</label>
        <span class="form-hint">Pilih prodi sesuai yang tercatat di sistem</span>
        <select id="prodi" class="form-control">
          <option value="">— Pilih Program Studi —</option>
        </select>
      </div>

      <button class="btn btn-primary" onclick="doLogin()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="white">
          <path d="M10 17l5-5-5-5v10zm-8 5V2l2 2v14l-2 2zm18 0l-2-2V4l2-2v20z"/>
        </svg>
        Masuk sebagai Alumni
      </button>

      <div class="auth-divider">atau</div>

      <button class="btn btn-ghost" onclick="window.location='pages/login-admin.html'">
        🔐 Login sebagai Administrator
      </button>

      <div class="auth-footer">
        &copy; 2026 Alumni Universitas Muhammadiyah Malang<br>
        <span>Sistem Pelacakan Data Alumni</span>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script>
    // Populate prodi dropdown
    const prodiSel = document.getElementById('prodi');
    PRODI_LIST.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p;
      opt.textContent = p;
      prodiSel.appendChild(opt);
    });

    // If already logged in as alumni, redirect
    if (isAlumniLoggedIn()) {
      window.location.href = 'pages/dashboard-alumni.html';
    }

    function doLogin() {
      const nim = document.getElementById('nim').value.trim();
      const prodi = document.getElementById('prodi').value;
      const err = document.getElementById('errorMsg');

      err.classList.remove('show');

      if (!nim || !prodi) {
        err.textContent = 'Mohon isi NIM dan Program Studi terlebih dahulu.';
        err.classList.add('show');
        return;
      }

      const alumni = alumniLogin(nim, prodi);
      if (alumni) {
        window.location.href = 'pages/dashboard-alumni.html';
      } else {
        err.textContent = 'NIM atau Program Studi tidak cocok dengan data kami. Pastikan data kamu sudah terdaftar.';
        err.classList.add('show');
        document.getElementById('nim').focus();
      }
    }

    // Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
