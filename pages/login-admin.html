<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin — Sistem Pelacakan Alumni UMM</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93C9.33 17.79 7 14.5 7 11V7.18L12 5z"/>
        </svg>
      </div>

      <h1 class="auth-title">Login Administrator</h1>
      <p class="auth-subtitle">Panel admin data alumni UMM</p>

      <div class="error-msg" id="errorMsg">
        Username atau password salah. Coba lagi.
      </div>

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <span class="form-hint">Masukkan username admin (contoh: admin)</span>
        <input type="text" id="username" class="form-control" placeholder="Masukkan username" value="">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <span class="form-hint">Masukkan password admin (contoh: admin123)</span>
        <input type="password" id="password" class="form-control" placeholder="Masukkan password">
      </div>

      <button class="btn btn-primary" onclick="doAdminLogin()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="white">
          <path d="M11 17l5-5-5-5v10zm-9 4V3l2 2v14L2 21zm18 0l-2-2V5l2-2v18z"/>
        </svg>
        Masuk sebagai Admin
      </button>

      <div class="auth-divider">atau</div>

      <button class="btn btn-ghost" onclick="window.location='../index.html'">
        ← Kembali ke Login Alumni
      </button>

      <div class="auth-footer">
        &copy; 2026 Alumni Universitas Muhammadiyah Malang
      </div>
    </div>
  </div>

  <script src="../js/script.js"></script>
  <script>
    if (isAdminLoggedIn()) {
      window.location.href = 'dashboard-admin.html';
    }

    function doAdminLogin() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const err = document.getElementById('errorMsg');
      err.classList.remove('show');

      if (!u || !p) {
        err.textContent = 'Mohon isi username dan password.';
        err.classList.add('show');
        return;
      }

      if (adminLogin(u, p)) {
        window.location.href = 'dashboard-admin.html';
      } else {
        err.classList.add('show');
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doAdminLogin();
    });
  </script>
</body>
</html>
